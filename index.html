<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌宠 · 模拟好友聊天</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    display: flex; flex-direction: column;
  }
  .header {
    background: #ededed;
    padding: 14px 20px;
    border-bottom: 1px solid #d6d6d6;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 6px;
    background: #07c160;
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 18px;
  }
  .header-name { font-weight: 500; font-size: 16px; }
  .header-info { font-size: 12px; color: #888; margin-top: 2px; }
  .friend-select {
    margin-left: auto;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 14px;
    background: white;
    color: #333;
    cursor: pointer;
    font-family: inherit;
  }
  .friend-select:focus { outline: none; border-color: #07c160; }
  .switching {
    position: fixed; top: 0; left: 0; right: 0;
    background: #07c160; color: white;
    text-align: center; padding: 8px;
    font-size: 13px; z-index: 100;
    display: none;
  }
  .switching.show { display: block; }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f5f5f5;
  }
  .msg-row { display: flex; margin-bottom: 16px; gap: 8px; align-items: flex-start; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 500; font-size: 14px;
  }
  .msg-row.friend .msg-avatar { background: #07c160; }
  .msg-row.user .msg-avatar { background: #576b95; }
  .msg-wrap { max-width: 65%; }
  .msg-row.user .msg-wrap { display: flex; flex-direction: column; align-items: flex-end; }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 6px;
    line-height: 1.5;
    word-wrap: break-word;
    font-size: 15px;
    color: #000;
  }
  .msg-row.friend .msg-bubble { background: white; }
  .msg-row.user .msg-bubble { background: #95ec69; }
  .msg-actions {
    display: flex; gap: 12px;
    margin-top: 6px;
    font-size: 12px;
    color: #888;
  }
  .play-btn, .refs-toggle {
    cursor: pointer;
    user-select: none;
  }
  .play-btn { color: #07c160; }
  .refs-toggle { color: #576b95; }
  .play-btn:hover, .refs-toggle:hover { text-decoration: underline; }
  .refs-panel {
    margin-top: 8px;
    padding: 10px 12px;
    background: #fafafa;
    border-radius: 4px;
    font-size: 12px;
    color: #555;
    display: none;
    white-space: pre-wrap;
    line-height: 1.7;
    border-left: 3px solid #07c160;
  }
  .refs-panel.show { display: block; }
  .refs-item + .refs-item {
    margin-top: 6px; padding-top: 6px;
    border-top: 1px dashed #ddd;
  }
  .refs-item b { color: #07c160; font-weight: 500; }
  .input-bar {
    background: #f7f7f7;
    border-top: 1px solid #d6d6d6;
    padding: 12px 16px;
    display: flex; gap: 8px; align-items: flex-end;
    flex-shrink: 0;
  }
  .mic-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #07c160;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .mic-btn.recording {
    background: #fa5151;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  #input-text {
    flex: 1;
    border: 1px solid #d6d6d6;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 15px;
    resize: none;
    max-height: 100px;
    min-height: 40px;
    font-family: inherit;
    background: white;
    line-height: 1.4;
  }
  #input-text:focus { outline: none; border-color: #07c160; }
  .send-btn {
    padding: 0 18px;
    background: #07c160;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    height: 40px;
    flex-shrink: 0;
  }
  .send-btn:disabled, .mic-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .typing {
    color: #888;
    font-size: 12px;
    font-style: italic;
    padding: 4px 0 4px 44px;
  }
  .empty {
    text-align: center;
    color: #999;
    margin-top: 80px;
    font-size: 14px;
    line-height: 1.8;
  }
  .empty .hint { font-size: 12px; color: #bbb; margin-top: 8px; }
</style>
</head>
<body>

<div class="switching" id="switching">正在切换好友...</div>

<div class="header">
  <div class="avatar" id="avatar">?</div>
  <div>
    <div class="header-name" id="friend-name">加载中...</div>
    <div class="header-info" id="info">连接中</div>
  </div>
  <select class="friend-select" id="friend-select" title="切换好友"></select>
</div>

<div class="chat" id="chat">
  <div class="empty" id="empty">
    输入文字 或 按住麦克风说话
    <div class="hint">回车发送 · Shift+回车换行</div>
  </div>
</div>

<div class="input-bar">
  <button class="mic-btn" id="mic-btn" title="按住录音" aria-label="录音">🎤</button>
  <textarea id="input-text" placeholder="说点什么..." rows="1"></textarea>
  <button class="send-btn" id="send-btn">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const empty = document.getElementById('empty');
const inputText = document.getElementById('input-text');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const friendNameEl = document.getElementById('friend-name');
const avatarEl = document.getElementById('avatar');
const infoEl = document.getElementById('info');
const friendSelect = document.getElementById('friend-select');
const switchingEl = document.getElementById('switching');

let friendName = '?';
let currentKey = '';
let useLocalTts = false;
let mediaRecorder = null;
let audioChunks = [];

fetch('/api/info').then(r => r.json()).then(data => {
  friendName = data.friend_name;
  currentKey = data.friend_key;
  useLocalTts = data.use_local_tts;
  friendNameEl.textContent = friendName;
  avatarEl.textContent = friendName[0];
  const ttsLabel = data.use_local_tts ? '本地音色 (GPT-SoVITS)' : '云端音色 (OpenAI)';
  infoEl.textContent = `${data.rag_count} 条聊天记录 · ${ttsLabel}`;

  // 填充好友下拉
  friendSelect.innerHTML = '';
  (data.friends || []).forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.key;
    opt.textContent = f.display_name;
    if (f.key === currentKey) opt.selected = true;
    friendSelect.appendChild(opt);
  });
});

// 切换好友
friendSelect.onchange = async () => {
  const newKey = friendSelect.value;
  if (newKey === currentKey) return;
  switchingEl.textContent = useLocalTts ? '正在切换好友 (加载音色约几秒)...' : '正在切换好友...';
  switchingEl.classList.add('show');
  friendSelect.disabled = true;
  sendBtn.disabled = true;
  micBtn.disabled = true;
  try {
    const form = new FormData();
    form.append('friend', newKey);
    const res = await fetch('/api/switch', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) {
      alert('切换失败: ' + data.error);
      friendSelect.value = currentKey;   // 切换失败, 回退选中
    } else {
      currentKey = data.friend_key;
      friendName = data.friend_name;
      friendNameEl.textContent = friendName;
      avatarEl.textContent = friendName[0];
      const ttsLabel = useLocalTts ? '本地音色 (GPT-SoVITS)' : '云端音色 (OpenAI)';
      infoEl.textContent = `${data.rag_count} 条聊天记录 · ${ttsLabel}`;
      // 清空聊天记录, 开始和新好友对话
      chat.innerHTML = '';
      chat.appendChild(empty);
      empty.style.display = 'block';
    }
  } catch (e) {
    alert('切换出错: ' + e.message);
    friendSelect.value = currentKey;
  } finally {
    switchingEl.classList.remove('show');
    friendSelect.disabled = false;
    sendBtn.disabled = false;
    micBtn.disabled = false;
  }
};

function addMessage(role, text, audioUrl, refs) {
  empty.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '我' : friendName[0];

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (audioUrl || (refs && refs.length)) {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';

    if (audioUrl) {
      const playBtn = document.createElement('span');
      playBtn.className = 'play-btn';
      playBtn.textContent = '▶ 播放';
      // 加时间戳防缓存, 避免 304 导致事件不触发
      const freshUrl = audioUrl + (audioUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
      const audio = new Audio(freshUrl);
      audio.preload = 'auto';

      const tryPlay = () => {
        const p = audio.play();
        if (p && p.catch) {
          p.catch(err => {
            console.warn('[播放失败]', err.name, err.message);
            playBtn.textContent = '▶ 点这里播放';
            playBtn.style.color = '#fa5151';
          });
        }
      };
      playBtn.onclick = () => { audio.currentTime = 0; tryPlay(); };
      actions.appendChild(playBtn);

      audio.addEventListener('error', () => {
        console.error('[音频加载错误]', audio.error && audio.error.code, freshUrl);
        playBtn.textContent = '⚠ 加载失败, 点重试';
        playBtn.style.color = '#fa5151';
      });

      // friend 消息自动播: 多重触发, 哪个先到用哪个, 避免 canplaythrough 不触发的坑
      if (role === 'friend') {
        let played = false;
        const autoPlayOnce = () => {
          if (played) return;
          played = true;
          tryPlay();
        };
        // 1) 能播了就播
        audio.addEventListener('canplay', autoPlayOnce, { once: true });
        // 2) 数据加载了也试 (canplay 不触发时的兜底)
        audio.addEventListener('loadeddata', autoPlayOnce, { once: true });
        // 3) 最后保险: 800ms 后无论如何试一次
        setTimeout(autoPlayOnce, 800);
      }
    }

    let refsPanel = null;
    if (refs && refs.length) {
      const refsToggle = document.createElement('span');
      refsToggle.className = 'refs-toggle';
      refsToggle.textContent = `查看 ${refs.length} 条 RAG 参考`;
      refsPanel = document.createElement('div');
      refsPanel.className = 'refs-panel';
      refsPanel.innerHTML = refs.map(r =>
        `<div class="refs-item"><b>来源: ${escapeHtml(r.source || '?')}</b><br>${escapeHtml(r.text).replace(/\n/g, '<br>')}</div>`
      ).join('');
      refsToggle.onclick = () => {
        refsPanel.classList.toggle('show');
        refsToggle.textContent = refsPanel.classList.contains('show')
          ? `收起参考`
          : `查看 ${refs.length} 条 RAG 参考`;
      };
      actions.appendChild(refsToggle);
    }

    wrap.appendChild(actions);
    if (refsPanel) wrap.appendChild(refsPanel);
  }

  row.appendChild(avatar);
  row.appendChild(wrap);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function showTyping() {
  removeTyping();
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typing-indicator';
  t.textContent = `${friendName} 正在输入...`;
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendText() {
  const text = inputText.value.trim();
  if (!text) return;
  addMessage('user', text);
  inputText.value = '';
  inputText.style.height = 'auto';
  sendBtn.disabled = true;
  micBtn.disabled = true;
  showTyping();
  try {
    const form = new FormData();
    form.append('text', text);
    form.append('friend', currentKey);
    const res = await fetch('/api/chat', { method: 'POST', body: form });
    const data = await res.json();
    removeTyping();
    if (data.error) addMessage('friend', '出错了: ' + data.error);
    else addMessage('friend', data.reply, data.audio_url, data.refs);
  } catch (e) {
    removeTyping();
    addMessage('friend', '网络错误: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    micBtn.disabled = false;
    inputText.focus();
  }
}

sendBtn.onclick = sendText;
inputText.onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
};
inputText.oninput = () => {
  inputText.style.height = 'auto';
  inputText.style.height = Math.min(inputText.scrollHeight, 100) + 'px';
};

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (blob.size < 1500) return;

      const placeholder = addMessage('user', '🎤 识别中...');
      sendBtn.disabled = true;
      micBtn.disabled = true;
      showTyping();
      try {
        const form = new FormData();
        form.append('audio', blob, 'voice.webm');
        form.append('friend', currentKey);
        const res = await fetch('/api/voice', { method: 'POST', body: form });
        const data = await res.json();
        removeTyping();
        if (data.error) {
          placeholder.textContent = '🎤 识别失败';
          addMessage('friend', '出错了: ' + data.error);
        } else {
          placeholder.textContent = data.user_text;
          addMessage('friend', data.reply, data.audio_url, data.refs);
        }
      } catch (e) {
        removeTyping();
        placeholder.textContent = '🎤 网络错误';
      } finally {
        sendBtn.disabled = false;
        micBtn.disabled = false;
      }
    };
    mediaRecorder.start();
    micBtn.classList.add('recording');
    micBtn.textContent = '●';
  } catch (e) {
    alert('无法访问麦克风: ' + e.message);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
  }
}

micBtn.addEventListener('mousedown', startRecording);
micBtn.addEventListener('mouseup', stopRecording);
micBtn.addEventListener('mouseleave', stopRecording);
micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
</script>

</body>
</html>
